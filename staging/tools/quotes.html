<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mes soumissions — MLP Reno & Design</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#c8a45a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MLP Tools">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="css/tools.css?v=27">
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-logo">M</div>
    <h1>MLP Reno &amp; Design</h1>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button id="install-app" class="header-link install-only" title="Installer l'app" style="display:none;color:var(--accent-dark);background:none;border:none;cursor:pointer;">
      <span class="material-icons-round">install_mobile</span>
    </button>
    <a href="quotes.html" class="header-link" title="Soumissions" style="color:var(--accent-dark);"><span class="material-icons-round">description</span></a>
    <a href="customers.html" class="header-link" title="Clients"><span class="material-icons-round">group</span></a>
    <a href="projects.html" class="header-link" title="Projets"><span class="material-icons-round">construction</span></a>
    <a href="index.html" class="btn btn-primary btn-sm" style="width:auto;text-decoration:none;margin-left:8px;">
      <span class="material-icons-round" style="font-size:18px">add</span>
      <span>Nouvelle</span>
    </a>
  </div>
</div>

<div class="main" id="main">
  <div class="step active">
    <div class="step-header">
      <div class="step-icon gold"><span class="material-icons-round">folder</span></div>
      <div class="step-title">Mes soumissions</div>
      <div class="step-subtitle">Toutes les soumissions enregistrées, triées par date</div>
    </div>

    <div id="list-root">
      <div style="text-align:center;padding:40px;color:var(--text-secondary);">
        <div class="spinner-ring" style="width:28px;height:28px;border-width:3px;margin-bottom:12px;"></div>
        <div>Chargement…</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script>
const quotesById = {};

(async function() {
  const root = document.getElementById('list-root');
  try {
    const quotes = await listQuotes();
    quotes.forEach(q => { quotesById[q.id] = q; });
    if (!quotes.length) {
      root.innerHTML = `<div class="card" style="text-align:center;padding:40px;color:var(--text-secondary);">
        <div style="font-size:48px;margin-bottom:8px;">📋</div>
        <div style="font-weight:600;color:var(--text-primary);margin-bottom:6px;">Aucune soumission</div>
        <div style="font-size:14px;">Cliquez sur « Nouvelle soumission » pour commencer.</div>
      </div>`;
      return;
    }
    root.innerHTML = '<div class="quotes-list">' + quotes.map(q => rowHtml(q)).join('') + '</div>';
  } catch (err) {
    root.innerHTML = `<div class="card" style="color:var(--red);">Erreur: ${err.message}</div>`;
  }
})();

function rowHtml(q) {
  const options = Array.isArray(q.options) ? q.options : [];
  const acceptedOpt = q.accepted_option_key ? options.find(o => o.key === q.accepted_option_key) : null;
  const total = acceptedOpt
    ? acceptedOpt.total
    : (options.length ? Math.max(...options.map(o => o.total || 0)) : 0);
  const totalLabel = options.length
    ? (options.length > 1 && !acceptedOpt
        ? `De $${money(Math.min(...options.map(o => o.total || 0)))} à $${money(total)}`
        : '$' + money(total))
    : '—';
  const statusText = {
    draft: 'Brouillon', sent: 'Envoyée', viewed: 'Consultée', signed: 'Signée', declined: 'Refusée', expired: 'Expirée'
  }[q.status] || q.status;
  const date = q.created_at ? new Date(q.created_at).toLocaleDateString('fr-CA') : '';

  const openTarget = q.status === 'draft'
    ? `index.html?draft=${encodeURIComponent(q.id)}`
    : (q.share_token ? `sign.html?token=${encodeURIComponent(q.share_token)}` : null);

  const sendable = q.share_token && q.status !== 'signed';

  const isSigned = q.status === 'signed';

  return `<div class="quote-row" data-id="${esc(q.id)}" style="flex-direction:column;align-items:stretch;gap:10px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;" onclick="openRow('${openTarget || ''}', '${q.status}')">
      <div class="quote-row-main">
        <div class="quote-row-title">${esc(q.project_title || q.quote_number)}</div>
        <div class="quote-row-sub">${esc(q.client_name || '—')} · ${date}</div>
      </div>
      <div class="quote-row-right">
        <div class="quote-row-total">${totalLabel}</div>
        <span class="status-pill ${q.status}">${statusText}</span>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      ${sendable ? `
        <button class="btn btn-secondary btn-sm" style="flex:1;padding:8px 12px;font-size:12px;" onclick="event.stopPropagation();quickSend('${q.id}','email', this)">
          <span class="material-icons-round" style="font-size:16px">mail</span>
          <span>Envoyer courriel</span>
        </button>
        <button class="btn btn-secondary btn-sm" style="flex:1;padding:8px 12px;font-size:12px;" onclick="event.stopPropagation();quickSend('${q.id}','sms', this)">
          <span class="material-icons-round" style="font-size:16px">sms</span>
          <span>Envoyer SMS</span>
        </button>
        <button class="btn btn-secondary btn-sm" style="flex:0 0 auto;padding:8px 12px;font-size:12px;" onclick="event.stopPropagation();copyPublicLink('${q.share_token}')">
          <span class="material-icons-round" style="font-size:16px">content_copy</span>
          <span>Copier le lien</span>
        </button>` : ''}
      <button class="btn btn-sm" title="Supprimer"
              style="flex:0 0 auto;padding:8px 10px;font-size:12px;margin-left:auto;background:transparent;color:var(--red);border:1px solid var(--red);"
              onclick="event.stopPropagation();confirmDeleteQuote('${q.id}')">
        <span class="material-icons-round" style="font-size:16px">delete</span>
        <span>Supprimer</span>
      </button>
    </div>
  </div>`;
}

async function confirmDeleteQuote(id) {
  const q = quotesById[id];
  if (!q) { console.warn('[delete] quote not in map', id); return; }
  const label = q.project_title || q.quote_number || id;
  const isSigned = q.status === 'signed';
  const warn = isSigned
    ? `⚠️ Cette soumission a été SIGNÉE.\n\nSupprimer « ${label} » va aussi effacer les factures associées. Continuer ?`
    : `Supprimer la soumission « ${label} » (${q.status}) ?\n\nCette action est définitive.`;
  if (!confirm(warn)) return;
  const row = document.querySelector(`.quote-row[data-id="${id}"]`);
  if (row) row.style.opacity = '0.5';
  try {
    await deleteQuote(id);
    delete quotesById[id];
    showToast('Soumission supprimée');
    if (row) row.remove();
    if (!document.querySelector('.quote-row')) location.reload();
  } catch (err) {
    console.error('[deleteQuote failed]', err);
    if (row) row.style.opacity = '';
    showToast('⚠️ ' + (err.message || err), 'error');
  }
}

function openRow(target, status) {
  if (!target) return;
  if (status === 'draft') window.location.href = target;
  else window.open(target, '_blank');
}

function copyPublicLink(token) {
  const base = (typeof PUBLIC_APP_URL === 'string' && PUBLIC_APP_URL) ? PUBLIC_APP_URL : (location.origin + '/staging/tools');
  const link = `${base}/sign.html?token=${encodeURIComponent(token)}`;
  navigator.clipboard.writeText(link).then(() => showToast('Lien copié !'));
}

async function quickSend(quoteId, channel, btn) {
  const originalHtml = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-ring"></span><span>Envoi…</span>';
  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/send-quote', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
      },
      body: JSON.stringify({ quote_id: quoteId, channel })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    showToast(channel === 'sms' ? `✓ SMS envoyé à ${data.to}` : `✓ Courriel envoyé à ${data.to}`);
  } catch (err) {
    showToast('⚠️ ' + (err.message || err), 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalHtml;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 3000);
}

function esc(s) { if (s === null || s === undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function money(n) { return parseFloat(n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
</script>
<script src="js/pwa.js?v=27"></script>

</body>
</html>
