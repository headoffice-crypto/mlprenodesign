<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Facture — MLP Reno &amp; Design</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#c8a45a">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --accent:#c8a45a;
      --accent-dark:#a68a3e;
      --accent-soft:#fffaf0;
      --ink:#202124;
      --muted:#5f6368;
      --hint:#9aa0a6;
      --line:#e8eaed;
      --line-soft:#f1f3f4;
      --bg:#f5f6f8;
      --green:#1e8e3e;
      --green-soft:#e6f4ea;
      --blue:#1a73e8;
      --red:#d93025;
      --radius:14px;
      --shadow:0 1px 3px rgba(0,0,0,0.06), 0 4px 24px rgba(0,0,0,0.04);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
      background:var(--bg); color:var(--ink);
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
      line-height:1.5; font-size:14px;
    }
    a{color:inherit}
    .page{
      max-width:800px; margin:32px auto; background:#fff;
      border-radius:var(--radius); box-shadow:var(--shadow);
      padding:48px 56px; position:relative;
    }
    .toolbar{
      display:flex; justify-content:flex-end; gap:8px;
      max-width:800px; margin:16px auto 0; padding:0 16px;
    }
    .btn{
      appearance:none; border:1px solid var(--line); background:#fff;
      color:var(--ink); border-radius:10px; padding:10px 16px;
      font:600 13px 'Inter',sans-serif; cursor:pointer;
      display:inline-flex; align-items:center; gap:8px;
      transition:all .15s ease;
    }
    .btn:hover{ background:#fafafa; border-color:#dadce0 }
    .btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent) }
    .btn.primary:hover{ background:var(--accent-dark); border-color:var(--accent-dark) }

    /* Brand header */
    .brand{
      display:flex; justify-content:space-between; align-items:flex-start;
      gap:24px; padding-bottom:24px; border-bottom:2px solid var(--accent);
      margin-bottom:32px;
    }
    .brand-name{ font-size:24px; font-weight:800; color:var(--accent); letter-spacing:-0.3px }
    .brand-tag{ font-size:12px; color:var(--muted); margin-top:2px }
    .brand-contact{ text-align:right; font-size:12px; color:var(--muted); line-height:1.7 }
    .brand-contact strong{ color:var(--ink); display:block; font-size:13px }

    /* Doc title row */
    .doc-head{
      display:flex; justify-content:space-between; align-items:flex-start;
      gap:24px; margin-bottom:32px;
    }
    .doc-title{ font-size:28px; font-weight:800; color:var(--ink); letter-spacing:-0.5px; line-height:1.1 }
    .doc-num{ font-size:14px; color:var(--muted); margin-top:4px; font-variant-numeric:tabular-nums }
    .doc-meta{ text-align:right; font-size:12px; color:var(--muted) }
    .doc-meta .label{ font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--hint) }
    .doc-meta .value{ font-size:13px; color:var(--ink); margin-bottom:8px }

    /* Customer + project block */
    .parties{
      display:grid; grid-template-columns:1fr 1fr; gap:20px;
      margin-bottom:36px;
    }
    .party h4{
      font-size:10px; text-transform:uppercase; letter-spacing:0.7px;
      color:var(--hint); margin:0 0 8px; font-weight:700;
    }
    .party .name{ font-size:15px; font-weight:700; color:var(--ink); margin-bottom:2px }
    .party div{ font-size:13px; color:var(--muted); line-height:1.6 }

    /* Hero amount card */
    .hero{
      background:linear-gradient(135deg,#fffaf0 0%,#f5edda 100%);
      border:1px solid #ecd9a9; border-radius:var(--radius);
      padding:28px 32px; margin-bottom:36px;
      display:flex; justify-content:space-between; align-items:center; gap:16px;
    }
    .hero.paid{ background:linear-gradient(135deg,#e6f4ea 0%,#d2efd9 100%); border-color:#a8d5b3 }
    .hero-label{
      font-size:10px; text-transform:uppercase; letter-spacing:0.7px; font-weight:700;
      color:var(--accent-dark); margin-bottom:4px;
    }
    .hero.paid .hero-label{ color:var(--green) }
    .hero-installment{ font-size:18px; font-weight:700; color:var(--ink); margin-bottom:2px }
    .hero-pct{ font-size:13px; color:var(--muted) }
    .hero-amount{ font-size:36px; font-weight:800; color:var(--ink); letter-spacing:-0.8px; font-variant-numeric:tabular-nums; line-height:1 }
    .hero-status{ display:inline-block; margin-top:6px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding:3px 10px; border-radius:20px; background:#fff; color:var(--accent-dark) }
    .hero.paid .hero-status{ background:var(--green); color:#fff }

    /* Section heading */
    .sec-h{
      font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px;
      color:var(--ink); margin:0 0 12px; padding-bottom:8px;
      border-bottom:1px solid var(--line);
    }

    /* Installment breakdown */
    .breakdown{ margin-bottom:32px }
    .row{ display:flex; justify-content:space-between; padding:6px 0; font-size:14px }
    .row .lbl{ color:var(--muted) }
    .row.total{
      border-top:2px solid var(--accent); margin-top:8px; padding-top:10px;
      font-size:16px; font-weight:800;
    }
    .row.total .lbl{ color:var(--ink) }
    .row.total .val{ color:var(--accent-dark); font-variant-numeric:tabular-nums }
    .row .val{ font-variant-numeric:tabular-nums }

    /* Schedule */
    .schedule{ margin-bottom:32px }
    .sched-table{ width:100%; border-collapse:collapse; font-size:13px }
    .sched-table th{
      text-align:left; padding:10px 12px; font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.6px; color:var(--hint);
      background:#fafbfc; border-bottom:1px solid var(--line);
    }
    .sched-table th.r{ text-align:right }
    .sched-table td{ padding:14px 12px; border-bottom:1px solid var(--line-soft); vertical-align:middle }
    .sched-table td.r{ text-align:right; font-variant-numeric:tabular-nums }
    .sched-table tr.this td{ background:#fffaf0 }
    .sched-table tr:last-child td{ border-bottom:none }
    .seq{
      display:inline-flex; width:22px; height:22px; align-items:center; justify-content:center;
      background:var(--line-soft); color:var(--muted);
      border-radius:50%; font-size:11px; font-weight:700; margin-right:10px;
    }
    .sched-table tr.this .seq{ background:var(--accent); color:#fff }
    .sched-table tr.paid-row .seq{ background:var(--green); color:#fff }
    .pill{
      display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:0.5px; padding:3px 8px; border-radius:20px;
    }
    .pill.paid{ background:var(--green-soft); color:var(--green) }
    .pill.sent{ background:#e8f0fe; color:var(--blue) }
    .pill.pending{ background:var(--line-soft); color:var(--muted) }
    .pill.overdue{ background:#fce8e6; color:var(--red) }
    .this-tag{
      display:inline-block; font-size:9px; font-weight:700; text-transform:uppercase;
      letter-spacing:0.5px; color:var(--accent-dark); margin-left:8px;
      background:#fff; padding:2px 7px; border-radius:20px; border:1px solid #ecd9a9;
    }

    /* Totals card */
    .totals{
      background:#fafbfc; border:1px solid var(--line); border-radius:var(--radius);
      padding:18px 22px; margin-bottom:32px;
    }
    .tot-row{ display:flex; justify-content:space-between; padding:6px 0; font-size:14px }
    .tot-row .lbl{ color:var(--muted) }
    .tot-row .val{ font-variant-numeric:tabular-nums; color:var(--ink) }
    .tot-row.paid .val{ color:var(--green); font-weight:700 }
    .tot-row.remaining{ border-top:1px solid var(--line); margin-top:6px; padding-top:12px; font-size:15px; font-weight:700 }
    .tot-row.remaining .val{ color:var(--accent-dark) }
    .tot-row.zero .val{ color:var(--green) }

    /* Payment methods */
    .pay{
      background:var(--accent-soft); border-left:4px solid var(--accent);
      border-radius:10px; padding:18px 22px; font-size:13px; color:var(--ink); line-height:1.7;
      white-space:pre-line; margin-bottom:24px;
    }
    .pay-note{ font-size:12px; color:var(--muted); margin-top:10px }

    /* Footer */
    .foot{
      margin-top:40px; padding-top:20px; border-top:1px solid var(--line);
      text-align:center; font-size:11px; color:var(--hint); line-height:1.7;
    }

    /* States */
    .state{
      max-width:540px; margin:80px auto; background:#fff; border-radius:var(--radius);
      box-shadow:var(--shadow); padding:48px 32px; text-align:center;
    }
    .state .icon{
      width:48px; height:48px; border-radius:50%; background:#fef7e0;
      color:var(--accent); display:flex; align-items:center; justify-content:center;
      margin:0 auto 14px; font-size:24px; font-weight:800;
    }
    .state.error .icon{ background:#fce8e6; color:var(--red) }
    .state h2{ font-size:18px; margin:0 0 6px }
    .state p{ font-size:13px; color:var(--muted); margin:0 }
    .spinner{ display:inline-block; width:32px; height:32px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite }
    @keyframes spin{ to{ transform:rotate(360deg) } }

    /* Mobile */
    @media (max-width:640px){
      .page{ margin:0; padding:24px 20px; border-radius:0; box-shadow:none; min-height:100vh }
      .brand{ flex-direction:column; gap:10px }
      .brand-contact{ text-align:left }
      .doc-head{ flex-direction:column; gap:6px }
      .doc-meta{ text-align:left }
      .doc-title{ font-size:22px }
      .parties{ grid-template-columns:1fr; gap:16px }
      .hero{ flex-direction:column; align-items:flex-start; padding:20px }
      .hero-amount{ font-size:30px }
      .sched-table th, .sched-table td{ padding:10px 8px; font-size:12px }
      .toolbar{ margin:8px auto; padding:8px 16px; background:#fff; border-bottom:1px solid var(--line); justify-content:space-between }
    }

    /* Print */
    @media print{
      body{ background:#fff }
      .toolbar{ display:none }
      .page{ box-shadow:none; margin:0; padding:32px 24px; max-width:none; border-radius:0 }
      @page{ size:letter; margin:14mm }
    }
  </style>
</head>
<body>

<div class="toolbar">
  <button class="btn" onclick="window.print()" aria-label="Imprimer / Sauvegarder en PDF">
    <span aria-hidden="true">⎙</span>
    <span id="btn-print-label">Imprimer / PDF</span>
  </button>
</div>

<div id="root">
  <div class="state">
    <div class="spinner" aria-label="Loading"></div>
    <p style="margin-top:14px;">Chargement…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="js/config-public.js"></script>
<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

(async function () {
  const root = document.getElementById('root');
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  if (!token) return showError('Lien invalide.', 'Invalid link.');

  try {
    const { data: invs, error: e1 } = await sb.from('invoices').select('*').eq('share_token', token).limit(1);
    if (e1) throw e1;
    const inv = invs && invs[0];
    if (!inv) return showError('Facture introuvable.', 'Invoice not found.');

    const [{ data: q, error: e2 }, { data: siblings, error: e3 }] = await Promise.all([
      sb.from('quotes').select('*').eq('id', inv.quote_id).maybeSingle(),
      sb.from('invoices').select('*').eq('project_id', inv.project_id).order('sequence', { ascending: true })
    ]);
    if (e2) throw e2;
    if (e3) throw e3;
    if (!q) return showError('Soumission liée introuvable.', 'Related quote not found.');

    render(inv, q, siblings || []);
  } catch (err) {
    console.error(err);
    showError('Erreur de chargement.', 'Failed to load.', err.message);
  }
})();

function render(inv, q, all) {
  const fr = q.language !== 'en';
  const isPaid = inv.status === 'paid';
  document.documentElement.lang = fr ? 'fr' : 'en';
  document.title = (isPaid ? (fr ? 'Reçu' : 'Receipt') : (fr ? 'Facture' : 'Invoice')) + ' ' + inv.invoice_number + ' — MLP Reno & Design';
  document.getElementById('btn-print-label').textContent = fr ? 'Imprimer / PDF' : 'Print / PDF';

  const contractTotal = all.reduce((s, i) => s + Number(i.amount_total || 0), 0);
  const paidToDate    = all.filter(i => i.status === 'paid').reduce((s, i) => s + Number(i.amount_total || 0), 0);
  const remaining     = Math.max(0, contractTotal - paidToDate);
  const projected     = isPaid ? remaining : Math.max(0, remaining - Number(inv.amount_total || 0));

  const T = fr ? L_FR : L_EN;
  const docLabel    = isPaid ? T.receipt : T.invoice;
  const heroLabel   = isPaid ? T.amountPaid : T.amountDue;
  const heroStatus  = isPaid ? T.paidOn(formatDate(inv.paid_at, fr)) : T.dueNow;
  const introDate   = formatDate(inv.created_at, fr);

  const scheduleRows = all.map(it => {
    const isThis = it.id === inv.id;
    const stKey = it.status || 'pending';
    const stLabel = T.status[stKey] || stKey;
    return `
      <tr class="${isThis ? 'this ' : ''}${stKey === 'paid' ? 'paid-row' : ''}">
        <td>
          <span class="seq">${it.sequence}</span>
          <strong>${esc(it.label || '')}</strong>
          ${isThis ? `<span class="this-tag">${T.thisOne}</span>` : ''}
        </td>
        <td class="r">${Number(it.pct_of_total || 0).toFixed(it.pct_of_total % 1 === 0 ? 0 : 2)}%</td>
        <td class="r">$${money(it.amount_total)}</td>
        <td class="r"><span class="pill ${stKey}">${stLabel}</span></td>
      </tr>`;
  }).join('');

  const remainingBlock = isPaid
    ? `<div class="tot-row remaining ${remaining === 0 ? 'zero' : ''}"><span class="lbl">${T.remaining}</span><span class="val">$${money(remaining)}</span></div>`
    : `<div class="tot-row"><span class="lbl">${T.remainingNow}</span><span class="val">$${money(remaining)}</span></div>
       <div class="tot-row remaining ${projected === 0 ? 'zero' : ''}"><span class="lbl">${T.remainingAfter}</span><span class="val">$${money(projected)}</span></div>`;

  const html = `
  <div class="page">
    <div class="brand">
      <div>
        <div class="brand-name">MLP Reno &amp; Design</div>
        <div class="brand-tag">${T.brandTag}</div>
      </div>
      <div class="brand-contact">
        <strong>${T.rbq}: 5847-0378-01</strong>
        (450) 500-8936<br>
        headoffice@mlpexperience.com
      </div>
    </div>

    <div class="doc-head">
      <div>
        <div class="doc-title">${docLabel}</div>
        <div class="doc-num">${esc(inv.invoice_number)}</div>
      </div>
      <div class="doc-meta">
        <div class="label">${T.date}</div>
        <div class="value">${introDate}</div>
        ${inv.due_date && !isPaid ? `<div class="label">${T.due}</div><div class="value">${formatDate(inv.due_date, fr)}</div>` : ''}
        ${isPaid && inv.paid_at ? `<div class="label">${T.paidOnLabel}</div><div class="value">${formatDate(inv.paid_at, fr)}</div>` : ''}
      </div>
    </div>

    <div class="parties">
      <div class="party">
        <h4>${T.billedTo}</h4>
        <div class="name">${esc(q.client_name || '')}</div>
        ${q.client_address ? `<div>${esc(q.client_address)}</div>` : ''}
        ${q.client_email ? `<div>${esc(q.client_email)}</div>` : ''}
        ${q.client_phone ? `<div>${esc(q.client_phone)}</div>` : ''}
      </div>
      <div class="party">
        <h4>${T.project}</h4>
        <div class="name">${esc(q.project_title || '—')}</div>
        <div>${T.contract}: ${esc(q.quote_number || '')}</div>
      </div>
    </div>

    <div class="hero ${isPaid ? 'paid' : ''}">
      <div>
        <div class="hero-label">${heroLabel}</div>
        <div class="hero-installment">${esc(inv.label || '')}</div>
        <div class="hero-pct">${T.installmentOf(inv.pct_of_total)}</div>
        <span class="hero-status">${heroStatus}</span>
      </div>
      <div style="text-align:right;">
        <div class="hero-amount">$${money(inv.amount_total)}</div>
      </div>
    </div>

    <div class="breakdown">
      <h3 class="sec-h">${T.breakdown}</h3>
      <div class="row"><span class="lbl">${T.subtotal}</span><span class="val">$${money(inv.amount_before_tax)}</span></div>
      <div class="row"><span class="lbl">TPS (5%)</span><span class="val">$${money(inv.gst)}</span></div>
      <div class="row"><span class="lbl">TVQ (9.975%)</span><span class="val">$${money(inv.qst)}</span></div>
      <div class="row total"><span class="lbl">${isPaid ? T.amountPaid : T.amountDue}</span><span class="val">$${money(inv.amount_total)}</span></div>
    </div>

    <div class="schedule">
      <h3 class="sec-h">${T.schedule}</h3>
      <table class="sched-table">
        <thead>
          <tr>
            <th>${T.installment}</th>
            <th class="r">%</th>
            <th class="r">${T.amount}</th>
            <th class="r">${T.statusH}</th>
          </tr>
        </thead>
        <tbody>${scheduleRows}</tbody>
      </table>
    </div>

    <div class="totals">
      <div class="tot-row"><span class="lbl">${T.contractTotal}</span><span class="val">$${money(contractTotal)}</span></div>
      <div class="tot-row paid"><span class="lbl">${T.paidToDate}</span><span class="val">$${money(paidToDate)}</span></div>
      ${remainingBlock}
    </div>

    ${!isPaid && q.payment_methods ? `
      <h3 class="sec-h">${T.payMethods}</h3>
      <div class="pay">${esc(q.payment_methods)}</div>
      <div class="pay-note">${T.referenceNote}</div>
    ` : ''}

    <div class="foot">
      MLP Reno &amp; Design — ${T.rbq} 5847-0378-01 — (450) 500-8936 — headoffice@mlpexperience.com
    </div>
  </div>`;

  document.getElementById('root').innerHTML = html;
}

function showError(msgFr, msgEn, detail) {
  const lang = (navigator.language || 'fr').toLowerCase().startsWith('en') ? 'en' : 'fr';
  const msg = lang === 'en' ? msgEn : msgFr;
  document.getElementById('root').innerHTML = `
    <div class="state error">
      <div class="icon">!</div>
      <h2>${esc(msg)}</h2>
      ${detail ? `<p>${esc(detail)}</p>` : ''}
    </div>`;
}

const L_FR = {
  brandTag: 'Construction & Rénovation',
  rbq: 'RBQ',
  invoice: 'Facture',
  receipt: 'Reçu de paiement',
  date: 'Date',
  due: 'Échéance',
  paidOnLabel: 'Reçu le',
  billedTo: 'Facturé à',
  project: 'Projet',
  contract: 'Contrat',
  amountDue: 'Montant dû',
  amountPaid: 'Montant payé',
  paidOn: (d) => 'Payée le ' + d,
  dueNow: 'À payer',
  installmentOf: (p) => p + '% du contrat',
  breakdown: 'Détail de ce versement',
  subtotal: 'Sous-total',
  schedule: 'Échéancier de paiement',
  installment: 'Versement',
  amount: 'Montant',
  statusH: 'Statut',
  thisOne: 'cette facture',
  contractTotal: 'Total du contrat',
  paidToDate: 'Payé à ce jour',
  remaining: 'Solde restant',
  remainingNow: 'Solde actuel',
  remainingAfter: 'Solde après ce paiement',
  payMethods: 'Méthodes de paiement',
  referenceNote: 'Merci d\'indiquer le numéro de facture lors du paiement.',
  status: { paid: 'Payée', sent: 'Envoyée', pending: 'À venir', overdue: 'En retard', cancelled: 'Annulée' }
};
const L_EN = {
  brandTag: 'Construction & Renovation',
  rbq: 'RBQ Licence',
  invoice: 'Invoice',
  receipt: 'Payment receipt',
  date: 'Date',
  due: 'Due date',
  paidOnLabel: 'Received on',
  billedTo: 'Billed to',
  project: 'Project',
  contract: 'Contract',
  amountDue: 'Amount due',
  amountPaid: 'Amount paid',
  paidOn: (d) => 'Paid ' + d,
  dueNow: 'Due now',
  installmentOf: (p) => p + '% of contract',
  breakdown: 'This installment',
  subtotal: 'Subtotal',
  schedule: 'Payment schedule',
  installment: 'Installment',
  amount: 'Amount',
  statusH: 'Status',
  thisOne: 'this invoice',
  contractTotal: 'Contract total',
  paidToDate: 'Paid to date',
  remaining: 'Remaining balance',
  remainingNow: 'Current balance',
  remainingAfter: 'Balance after this payment',
  payMethods: 'Payment methods',
  referenceNote: 'Please reference the invoice number with your payment.',
  status: { paid: 'Paid', sent: 'Sent', pending: 'Upcoming', overdue: 'Overdue', cancelled: 'Cancelled' }
};

function esc(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function money(n) { return Number(n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function formatDate(s, fr) {
  if (!s) return '';
  const d = new Date(s.length === 10 ? s + 'T00:00:00' : s);
  if (isNaN(d)) return s;
  if (fr) {
    const m = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    return d.getDate() + ' ' + m[d.getMonth()] + ' ' + d.getFullYear();
  }
  return d.toLocaleDateString('en-CA', { year:'numeric', month:'long', day:'numeric' });
}
</script>
