<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients — MLP Reno & Design</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="css/tools.css?v=18">
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-logo">M</div>
    <h1>MLP Reno &amp; Design <span style="font-size:10px;background:var(--green-light);color:var(--green);padding:2px 6px;border-radius:10px;margin-left:6px;font-weight:600;">v18</span></h1>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <a href="quotes.html" class="header-link" title="Soumissions"><span class="material-icons-round">description</span></a>
    <a href="customers.html" class="header-link" title="Clients" style="color:var(--accent-dark);"><span class="material-icons-round">group</span></a>
    <a href="projects.html" class="header-link" title="Projets"><span class="material-icons-round">construction</span></a>
    <a href="index.html" class="btn btn-primary btn-sm" style="width:auto;text-decoration:none;margin-left:8px;">
      <span class="material-icons-round" style="font-size:18px">add</span>
      <span>Nouvelle soumission</span>
    </a>
  </div>
</div>

<div class="main" id="main">
  <div class="step active">
    <div class="step-header">
      <div class="step-icon gold"><span class="material-icons-round">group</span></div>
      <div class="step-title">Clients</div>
      <div class="step-subtitle">Tous vos clients avec leurs soumissions et revenus</div>
    </div>
    <div id="list-root">
      <div style="text-align:center;padding:40px;color:var(--text-secondary);">
        <div class="spinner-ring" style="width:28px;height:28px;border-width:3px;margin-bottom:12px;"></div>
        <div>Chargement…</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script>
(async function() {
  const root = document.getElementById('list-root');
  try {
    const customers = await listCustomersWithStats();
    if (!customers.length) {
      root.innerHTML = `<div class="card" style="text-align:center;padding:40px;color:var(--text-secondary);">
        <div style="font-size:48px;margin-bottom:8px;">👤</div>
        <div style="font-weight:600;color:var(--text-primary);margin-bottom:6px;">Aucun client</div>
        <div style="font-size:14px;">Les clients seront créés automatiquement lors de la première soumission.</div>
      </div>`;
      return;
    }
    root.innerHTML = '<div class="customer-grid">' + customers.map(cardHtml).join('') + '</div>';
  } catch (err) {
    root.innerHTML = `<div class="card" style="color:var(--red);">Erreur: ${err.message}</div>`;
  }
})();

function initials(name) {
  return (name || '?')
    .split(/\s+/)
    .filter(Boolean)
    .slice(0, 2)
    .map(w => w[0].toUpperCase())
    .join('') || '?';
}

function fmtSince(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return 'Client depuis ' + d.toLocaleDateString('fr-CA', { year: 'numeric', month: 'short' });
}

function cardHtml(c) {
  const s = c.stats;
  const contact = [];
  if (c.phone)   contact.push(`<a href="tel:${esc(c.phone)}" onclick="event.stopPropagation();"><span class="material-icons-round">phone</span><span class="cc-val">${esc(c.phone)}</span></a>`);
  if (c.email)   contact.push(`<a href="mailto:${esc(c.email)}" onclick="event.stopPropagation();"><span class="material-icons-round">mail</span><span class="cc-val">${esc(c.email)}</span></a>`);
  if (c.address) contact.push(`<span><span class="material-icons-round">place</span><span class="cc-val">${esc(c.address)}</span></span>`);

  // Action buttons: primary = view project if one exists, else view profile
  let actions = '';
  if (s.project_id) {
    actions += `<a href="project.html?id=${encodeURIComponent(s.project_id)}" class="btn btn-primary" onclick="event.stopPropagation();">
      <span class="material-icons-round">construction</span><span>Voir le projet</span>
    </a>`;
    actions += `<a href="customer.html?id=${encodeURIComponent(c.id)}" class="btn btn-secondary" onclick="event.stopPropagation();">
      <span class="material-icons-round">person</span><span>Profil</span>
    </a>`;
  } else {
    actions += `<a href="customer.html?id=${encodeURIComponent(c.id)}" class="btn btn-primary" onclick="event.stopPropagation();">
      <span class="material-icons-round">person</span><span>Voir le profil</span>
    </a>`;
  }

  return `<div class="customer-card" onclick="location.href='customer.html?id=${encodeURIComponent(c.id)}'">
    <div class="cc-head">
      <div class="cc-avatar">${initials(c.name)}</div>
      <div style="min-width:0;flex:1;">
        <div class="cc-name">${esc(c.name)}</div>
        <div class="cc-since">${fmtSince(c.created_at)}</div>
      </div>
    </div>
    <div class="cc-contact">${contact.join('') || '<span style="color:var(--text-hint);font-style:italic;">Aucun contact</span>'}</div>
    <div class="cc-stats">
      <div class="cc-stat"><div class="cc-stat-v">${s.quotes}</div><div class="cc-stat-l">Soumissions</div></div>
      <div class="cc-stat"><div class="cc-stat-v">${s.signed}</div><div class="cc-stat-l">Signées</div></div>
      <div class="cc-stat"><div class="cc-stat-v">$${money(s.revenue)}</div><div class="cc-stat-l">Revenu</div></div>
    </div>
    <div class="cc-actions">${actions}</div>
  </div>`;
}

function esc(s) { if (s === null || s === undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function money(n) { return parseFloat(n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
</script>
</body>
</html>
